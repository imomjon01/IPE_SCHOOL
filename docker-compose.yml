version: '3.8'

services:
  app:
    image: ipe-school:latest
    container_name: ipe-school-app
    ports:
      - "80:80"
    depends_on:
      - db
    networks:
      - app-network
      - db-network
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: ipe-school-db
    environment:
      POSTGRES_DB: ipe_school
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
    expose:
      - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - db-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
  db-network:
    driver: bridge
    internal: true   # ✅ tashqi chiqish yo‘q

volumes:
  db-data:
